<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業パイプラインダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic Pro','Yu Gothic','Meiryo',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.header{background:#1a1a1a;padding:20px 32px;display:flex;align-items:center;gap:16px}
.header h1{font-size:16px;font-weight:600;color:#fff;letter-spacing:.04em}
.header-sub{font-size:11px;color:#888;margin-left:auto}
.main{max-width:1200px;margin:0 auto;padding:24px}
.mrow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.mc{background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #e8e6e0}
.ml{font-size:11px;color:#888;margin-bottom:4px}
.mv{font-size:24px;font-weight:700;color:#1a1a1a}
.ms{font-size:11px;color:#aaa;margin-top:3px}
.filters{background:#fff;border-radius:10px;padding:18px 20px;margin-bottom:18px;border:1px solid #e8e6e0}
.sec{font-size:11px;font-weight:600;color:#888;margin:0 0 10px;letter-spacing:.06em;text-transform:uppercase}
.cr{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.cr:last-child{margin-bottom:0}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid #ddd;user-select:none;transition:all .15s;background:#f5f4f0;color:#666}
.chip.on{font-weight:600}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.qchip{display:inline-flex;flex-direction:column;align-items:center;padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;border:1.5px solid #ddd;user-select:none;transition:all .15s;background:#f5f4f0;color:#666;min-width:88px;text-align:center}
.qchip.on{font-weight:600}
.ql{font-weight:600;font-size:13px}
.qs{font-size:10px;margin-top:2px;opacity:.8}
.charts-row{display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:18px}
.cbox{background:#fff;border-radius:10px;padding:18px 20px;border:1px solid #e8e6e0}
.ct{font-size:11px;font-weight:600;color:#888;margin-bottom:14px;letter-spacing:.06em;text-transform:uppercase}
.tbl-wrap{background:#fff;border-radius:10px;border:1px solid #e8e6e0;overflow:hidden}
.tbl-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #f0ede8}
.tbl-header h2{font-size:11px;font-weight:600;color:#888;letter-spacing:.06em;text-transform:uppercase}
.tbl-info{font-size:11px;color:#aaa}
.tscroll{max-height:420px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:11px;font-weight:600;color:#888;padding:8px 12px;border-bottom:1px solid #f0ede8;text-align:left;position:sticky;top:0;background:#fff;z-index:1}
td{padding:7px 12px;border-bottom:1px solid #f8f7f5;color:#333;vertical-align:middle}
tr:hover td{background:#faf9f7}
.bdg{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.foot{text-align:center;padding:16px;font-size:11px;color:#bbb}
@media(max-width:768px){.mrow{grid-template-columns:repeat(2,1fr)}.charts-row{grid-template-columns:1fr}.main{padding:12px}}
</style>
</head>

<div class="header">

</div>
<div class="foot">データソース: 案件一覧.xlsx &nbsp;|&nbsp; FY2026 Q1〜Q4（4月〜翌3月）</div>

const NMAP=['大井　教浩','青木　理','佐野　元康','濱出 拓弥','太田　拡','室岡　春風'];
const SMAP=['受注','確度A','確度B','確度C','確度D'];
const TMAP=['導入','物販','保守','工事','派遣'];
const QRAW=[...new Set(DATA.map(r=>r[7]))].sort();

// 四半期の表示ラベル（会計年度基準: Q1=4-6月）
const Q_LABELS={
  'Q1':{l:'第1四半期',s:'4〜6月'},
  'Q2':{l:'第2四半期',s:'7〜9月'},
  'Q3':{l:'第3四半期',s:'10〜12月'},
  'Q4':{l:'第4四半期',s:'1〜3月'}
};
const QLIST=QRAW.map(k=>{
  const fy=k.slice(2,6), q=k.slice(7);
  const lbl=Q_LABELS[q]||{l:q,s:''};
  return{k, l:'FY'+fy+' '+lbl.l, s:lbl.s};
});

const QCL={'Q1':'#2563eb','Q2':'#059669','Q3':'#d97706','Q4':'#7c3aed'};
const QBG={'Q1':'#eff6ff','Q2':'#ecfdf5','Q3':'#fffbeb','Q4':'#f5f3ff'};
const QTX={'Q1':'#1d4ed8','Q2':'#047857','Q3':'#92400e','Q4':'#5b21b6'};
const SCL={'受注':'#059669','確度A':'#2563eb','確度B':'#60a5fa','確度C':'#d97706','確度D':'#dc2626'};
const SBG={'受注':'#ecfdf5','確度A':'#eff6ff','確度B':'#dbeafe','確度C':'#fffbeb','確度D':'#fef2f2'};
const STX={'受注':'#065f46','確度A':'#1e40af','確度B':'#1e40af','確度C':'#78350f','確度D':'#991b1b'};
const PALETTE=['#2563eb','#059669','#d97706','#7c3aed','#dc2626','#6b7280'];
const TCL=Object.fromEntries(TMAP.map((t,i)=>[t,PALETTE[i%PALETTE.length]]));
const PCL=NMAP.map((_,i)=>PALETTE[i%PALETTE.length]);

let selQ=new Set(QRAW), selS=new Set(SMAP), selT=new Set(TMAP);
const fmt=v=>v>=100000000?(v/100000000).toFixed(1)+'億':v>=10000?Math.round(v/10000).toLocaleString()+'万':v>0?v.toLocaleString():'0';

function filtered(){
  return DATA.filter(r=>selQ.has(r[7])&&selS.has(SMAP[parseInt(r[2])])&&selT.has(TMAP[parseInt(r[1])]));
}

function buildChips(){
  const qc=document.getElementById('qC'); qc.innerHTML='';
  QLIST.forEach(q=>{
    const on=selQ.has(q.k), qk=q.k.slice(7);
    const b=document.createElement('span');
    b.className='qchip'+(on?' on':'');
    if(on) b.style.cssText='background:'+QBG[qk]+';border-color:'+QCL[qk]+';color:'+QTX[qk];
    b.innerHTML='<span class="ql">'+q.l+'</span><span class="qs">'+q.s+'</span>';
    b.onclick=()=>{if(selQ.has(q.k)){if(selQ.size>1)selQ.delete(q.k);}else selQ.add(q.k);buildChips();update();};
    qc.appendChild(b);
  });
  const sc=document.getElementById('sC'); sc.innerHTML='';
  SMAP.forEach(s=>{
    const on=selS.has(s);
    const b=document.createElement('span');
    b.className='chip'+(on?' on':'');
    if(on) b.style.cssText='background:'+SBG[s]+';color:'+STX[s]+';border-color:'+SCL[s];
    b.innerHTML='<span class="dot" style="background:'+(on?SCL[s]:'#ccc')+'"></span>'+s;
    b.onclick=()=>{if(selS.has(s)){if(selS.size>1)selS.delete(s);}else selS.add(s);buildChips();update();};
    sc.appendChild(b);
  });
  const tc=document.getElementById('tC'); tc.innerHTML='';
  TMAP.forEach(t=>{
    const on=selT.has(t);
    const b=document.createElement('span');
    b.className='chip'+(on?' on':'');
    if(on) b.style.cssText='background:#f0f4ff;color:#1e40af;border-color:'+(TCL[t]||'#ccc');
    b.innerHTML='<span class="dot" style="background:'+(on?TCL[t]:'#ccc')+'"></span>'+t;
    b.onclick=()=>{if(selT.has(t)){if(selT.size>1)selT.delete(t);}else selT.add(t);buildChips();update();};
    tc.appendChild(b);
  });
}

let ch1=null, ch2=null;

function update(){
  const data=filtered();
  const total=data.reduce((s,r)=>s+r[3],0);
  const pset=new Set(data.map(r=>r[0]));
  document.getElementById('mC').textContent=data.length.toLocaleString();
  document.getElementById('mT').textContent=fmt(total);
  document.getElementById('mTs').textContent='¥'+total.toLocaleString();
  document.getElementById('mP').textContent=pset.size;
  document.getElementById('mA').textContent=data.length?fmt(Math.round(total/data.length)):'—';

  const pd=NMAP.map((_,i)=>data.filter(r=>parseInt(r[0])===i).reduce((s,r)=>s+r[3],0));
  if(ch1){ch1.data.datasets[0].data=pd; ch1.update();}

  const tl=TMAP.filter(t=>selT.has(t));
  if(ch2){
    ch2.data.labels=tl;
    ch2.data.datasets[0].data=tl.map(t=>{
      const ti=TMAP.indexOf(t);
      return data.filter(r=>parseInt(r[1])===ti).reduce((s,r)=>s+r[3],0);
    });
    ch2.data.datasets[0].backgroundColor=tl.map(t=>TCL[t]||'#ccc');
    ch2.update();
  }

  const sorted=[...data].sort((a,b)=>b[3]-a[3]).slice(0,200);
  document.getElementById('tb').innerHTML=sorted.map(r=>{
    const ni=parseInt(r[0]), si=parseInt(r[2]), ti=parseInt(r[1]);
    const name=NMAP[ni]||'', status=SMAP[si]||'', type=TMAP[ti]||'';
    return '<tr>'
      +'<td><span class="bdg" style="background:'+(SBG[status]||'#eee')+';color:'+(STX[status]||'#333')+'">'+status+'</span></td>'
      +'<td style="white-space:nowrap">'+name+'</td>'
      +'<td style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r[4]+'</td>'
      +'<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+r[5].replace(/"/g,'&quot;')+'">'+r[5]+'</td>'
      +'<td style="color:'+(TCL[type]||'#666')+';font-weight:600">'+type+'</td>'
      +'<td style="text-align:right;font-weight:600">'+fmt(r[3])+'</td>'
      +'<td style="color:#999;white-space:nowrap">'+r[6]+'</td>'
      +'</tr>';
  }).join('');
  document.getElementById('lc').textContent='上位200件 / 合計 '+data.length.toLocaleString()+'件 · '+fmt(total);
}

buildChips();

ch1=new Chart(document.getElementById('c1'),{
  type:'bar',
  data:{labels:NMAP.map(n=>n.trim()),datasets:[{data:NMAP.map((_,i)=>DATA.filter(r=>parseInt(r[0])===i).reduce((s,r)=>s+r[3],0)),backgroundColor:PCL,borderRadius:4,borderSkipped:false}]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.raw)}}},scales:{x:{ticks:{font:{size:11},maxRotation:35},grid:{display:false}},y:{ticks:{callback:v=>fmt(v),font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'},border:{display:false}}}}
});

ch2=new Chart(document.getElementById('c2'),{
  type:'doughnut',
  data:{labels:TMAP,datasets:[{data:TMAP.map((_,i)=>DATA.filter(r=>parseInt(r[1])===i).reduce((s,r)=>s+r[3],0)),backgroundColor:TMAP.map(t=>TCL[t]||'#ccc'),borderWidth:0,hoverOffset:6}]},
  options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:10,padding:10}},tooltip:{callbacks:{label:c=>c.label+': '+fmt(c.raw)}}}}
});

update();
</script>
